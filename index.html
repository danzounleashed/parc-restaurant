<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parc | Immersive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            /* The total height determines how long the "scroll" is */
            height: 500vh; 
        }

        /* The video stays stuck in the background */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* This creates the text sections that scroll over the video */
        .scroll-content {
            position: relative;
            z-index: 2;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        /* Class to fade in text when we reach a section */
        section.active h1 {
            opacity: 1;
            transform: translateY(0);
        }

        .subtitle {
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <!-- Replace 'your-video.mp4' with your actual file name later -->
        <video id="v0" tabindex="0" autobuffer="auto" preload="auto" playsinline>
            <source src="https://www.apple.com/105/media/us/airpods-pro/2022/d2de0310-9859-421d-9bcf-0f1d85f001be/anim/hero/large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="scroll-content">
        <section id="step1" class="active">
            <p class="subtitle">Philadelphia's Favorite</p>
            <h1>PARC</h1>
        </section>

        <section id="step2">
            <p class="subtitle">The Atmosphere</p>
            <h1>Immersive Dining</h1>
        </section>

        <section id="step3">
            <p class="subtitle">Parisian Heart</p>
            <h1>Le Menu</h1>
            <a href="#" class="btn">View Selection</a>
        </section>

        <section id="step4">
            <p class="subtitle">Join Us</p>
            <h1>Reserve</h1>
        </section>
    </div>

    <script>
        const video = document.getElementById('v0');
        const sections = document.querySelectorAll('section');

        // 1. SCROLL VIDEO LOGIC
        // This maps the scroll position to the video timeline
        window.onscroll = function() {
            const scrollPos = window.pageYOffset;
            const maxScroll = document.body.offsetHeight - window.innerHeight;
            const scrollFraction = scrollPos / maxScroll;
            
            if (video.duration) {
                // This is the magic line that plays the video forward and backward
                video.currentTime = video.duration * scrollFraction;
            }

            // 2. TEXT ANIMATION LOGIC
            // Checks which section we are in to fade text in
            sections.forEach(section => {
                const rect = section.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.5 && rect.bottom > window.innerHeight * 0.5) {
                    section.classList.add('active');
                } else {
                    section.classList.remove('active');
                }
            });
        };

        // Standard setup to make sure video is ready
        video.pause(); 
    </script>
</body>
</html>
